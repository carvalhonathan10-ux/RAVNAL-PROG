// ---- Helpers de date ----
function mondayOf(offsetWeeks) {
  const d = new Date();
  const day = (d.getDay() + 6) % 7; // 0 = lundi
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - day + offsetWeeks * 7);
  return d;
}
function keyOf(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}
function addDays(date, n) {
  const c = new Date(date);
  c.setDate(c.getDate() + n);
  return c;
}
function mondayOfDate(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day);
  return d;
}
function keyToDate(k) {
  const [y, m, d] = k.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function weekKeyOf(date) {
  return keyOf(mondayOfDate(date));
}

  let max = 0;

  Object.values(blocksByDate).forEach(scan);
  scan(templates);
  uid = max + 1;
}

function bumpUidPrograms(programData = {}, templates = []) {

  uid = max + 1;

// Migration vers le modèle "cycles" (objets à plage de dates, superposables)
function migrateCycles(pd = {}) {
  const out = {};
  for (const id of Object.keys(pd)) {
    const p = pd[id] || {};
    const np = {
      blocks: p.blocks || {},
      doneDays: p.doneDays || {},
      cycles: Array.isArray(p.cycles) ? p.cycles : [],
    };
    if (p.phases && !np.cycles.length) {
      Object.keys(p.phases).forEach((wk) => {
        const ph = p.phases[wk] || {};
        const start = keyToDate(wk);
        const th = THEMES.find((t) => t.id === ph.theme);
        np.cycles.push({
          id: newCycleId(),
          themeId: ph.theme || "gym",
          name: th ? th.label : "Cycle",
          text: ph.text || "",
          startKey: wk,
          endKey: keyOf(addDays(start, 6)),
        });
      });
    } else if (p.themes && !np.cycles.length) {
      Object.keys(p.themes).forEach((dk) => {
        const th = THEMES.find((t) => t.id === p.themes[dk]);
        np.cycles.push({
          id: newCycleId(),
          themeId: p.themes[dk] || "gym",
          name: th ? th.label : "Cycle",
          text: "",
          startKey: dk,
          endKey: dk,
        });
      });
    }
    out[id] = np;
  }
  return out;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function buildPrintableHTML(weekDates, blocksByDate, weekLabel) {
  const days = weekDates
    .map((d, i) => {
      const list = blocksByDate[keyOf(d)] || [];
      const inner = list.length
        ? list
            .map((b) => {
              const c = COLORS[b.color] || COLORS[0];
              return `<div class="blk" style="background:${c.bg};border-left:5px solid ${c.bar};"><div class="blk-h"><strong>${escapeHtml(
                b.title
              )}</strong>${b.duration ? ` <span>${escapeHtml(b.duration)}</span>` : ""}</div>${
                b.content ? `<pre>${escapeHtml(b.content)}</pre>` : ""
              }</div>`;
            })
            .join("")
        : `<div class="empty">—</div>`;
      return `<section class="day"><h2>${DAYS_FR[i]} ${d.getDate()}</h2>${inner}</section>`;
    })
    .join("");
  return `<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Planning ${escapeHtml(weekLabel)}</title>
<style>
  *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  body{font-family:system-ui,Arial,sans-serif;margin:20px;color:#1e293b;}
  h1{font-size:18px;margin:0 0 14px;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .day{border:1px solid #e2e8f0;border-radius:8px;padding:8px;break-inside:avoid;background:#fff;}
  .day h2{font-size:12px;margin:0 0 8px;border-bottom:1px solid #f1f5f9;padding-bottom:4px;color:#0f172a;}
  .blk{border-radius:6px;padding:6px;margin-bottom:6px;break-inside:avoid;}
  .blk-h{font-size:11px;color:#0f172a;}
  .blk-h span{color:#475569;font-weight:600;}
  .blk pre{font-family:inherit;font-size:10px;white-space:pre-wrap;margin:4px 0 0;color:#334155;}
  .empty{color:#cbd5e1;font-size:12px;}
  @page{size:landscape;margin:10mm;}
</style></head>
<body><h1>Planning — ${escapeHtml(weekLabel)}</h1><div class="grid">${days}</div></body></html>`;
}

function App() {
  const [weekOffset, setWeekOffset] = useState(0);
  const [programs, setPrograms] = useState([]); // [{ id, name }]
  const [programData, setProgramData] = useState({}); // { [id]: { blocks, doneDays } }
  const [activeId, setActiveId] = useState(null);
  const [templates, setTemplates] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("saved"); // saving | saved | error
  const saveTimer = useRef(null);
  const [menuFor, setMenuFor] = useState(null); // block id with open "…" menu
  const [editor, setEditor] = useState(null); // { mode, dateKey, blockId, draft }
  const [dragOverKey, setDragOverKey] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const [dayClipboard, setDayClipboard] = useState(null);
  const [weekClipboard, setWeekClipboard] = useState(null);
  const [dayMenuFor, setDayMenuFor] = useState(null);
  const [weekMenuOpen, setWeekMenuOpen] = useState(false);
  const [templatesOpen, setTemplatesOpen] = useState(false);
  const [templateCategories, setTemplateCategories] = useState([]); // [{ id, name }]
  const [templateSave, setTemplateSave] = useState(null); // { block, categoryId, newCat }
  const [newCatName, setNewCatName] = useState("");
  const [programsOpen, setProgramsOpen] = useState(false);
  const [viewMode, setViewMode] = useState("week"); // week | month | cycle
  const [monthOffset, setMonthOffset] = useState(0);
  const [cycleEdit, setCycleEdit] = useState(null); // { mode, draft }
  const [cycleSearch, setCycleSearch] = useState("");
  const [presentDate, setPresentDate] = useState(null); // Date | null (mode présentation)
  const fileInputRef = useRef(null);
  const programInputRef = useRef(null);
  const dragRef = useRef(null); // { fromKey, blockId }

  // ---- Données du programme actif (blocks / doneDays dérivés) ----
  const activeData = programData[activeId] || { blocks: {}, doneDays: {} };
  const blocks = activeData.blocks;
  const doneDays = activeData.doneDays;
  const cycles = activeData.cycles || [];
  const activeProgram = programs.find((p) => p.id === activeId);
  const activeName = activeProgram ? activeProgram.name : "Programmation";

  const setBlocks = (updater) =>
    setProgramData((pd) => {
      const cur = pd[activeId] || { blocks: {}, doneDays: {} };
      const nextBlocks = typeof updater === "function" ? updater(cur.blocks) : updater;
      return { ...pd, [activeId]: { ...cur, blocks: nextBlocks } };
    });
  const setDoneDays = (updater) =>
    setProgramData((pd) => {
      const cur = pd[activeId] || { blocks: {}, doneDays: {} };
      const nextDone = typeof updater === "function" ? updater(cur.doneDays) : updater;
      return { ...pd, [activeId]: { ...cur, doneDays: nextDone } };
    });
  const setCycles = (updater) =>
    setProgramData((pd) => {
      const cur = pd[activeId] || { blocks: {}, doneDays: {} };
      const nextCycles =
        typeof updater === "function" ? updater(cur.cycles || []) : updater;
      return { ...pd, [activeId]: { ...cur, cycles: nextCycles } };
    });
  // cycles couvrant un jour / une semaine (chevauchement possible)
  const cyclesForDate = (dk) =>
    cycles.filter((c) => c.startKey <= dk && dk <= c.endKey);
  const cyclesForWeek = (wkStart) => {
    const a = keyOf(wkStart);
    const b = keyOf(addDays(wkStart, 6));
    return cycles.filter((c) => c.startKey <= b && c.endKey >= a);
  };
  const sortedCycles = [...cycles].sort((x, y) =>
    x.startKey < y.startKey ? -1 : x.startKey > y.startKey ? 1 : 0
  );

  // Chargement initial depuis la mémoire
  useEffect(() => {
    let cancelled = false;
    const fallback = () => {
      const pid = newProgramId();
      const seeded = seedData();
      setPrograms([{ id: pid, name: "Programmation Box" }]);
      setProgramData({ [pid]: { blocks: seeded, doneDays: {} } });
      setActiveId(pid);
    };
    (async () => {
      if (!hasStorage) {
        fallback();
        setLoaded(true);
        return;
      }
      try {
        const res = await DB.load(STORAGE_KEY);
        if (!cancelled && res && res.value) {
          const data = JSON.parse(res.value);
          if (data.programs && data.programData) {
            // format multi-programmes
            bumpUidPrograms(data.programData, data.templates);
            setPrograms(data.programs);
            setProgramData(migrateCycles(data.programData));
            setActiveId(data.activeId || (data.programs[0] && data.programs[0].id));
            setTemplates(data.templates || []);
            setTemplateCategories(data.templateCategories || []);
          } else {
            // ancien format { blocks, templates, doneDays } → migration
            const pid = newProgramId();
            bumpUid(data.blocks, data.templates);
            setPrograms([{ id: pid, name: "Programmation Box" }]);
            setProgramData({ [pid]: { blocks: data.blocks || {}, doneDays: data.doneDays || {} } });
            setActiveId(pid);
            setTemplates(data.templates || []);
          }
        } else if (!cancelled) {
          fallback();
        }
      } catch (e) {
        // clé inexistante au premier lancement → on amorce avec la démo
        if (!cancelled) fallback();
      } finally {
        if (!cancelled) setLoaded(true);
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  // Sauvegarde automatique (anti-rebond)
  useEffect(() => {
    if (!loaded || !hasStorage) return;
    setSaveStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await DB.save(
          STORAGE_KEY,
          JSON.stringify({ programs, programData, activeId, templates, templateCategories })
        );
        setSaveStatus("saved");
      } catch (e) {
        setSaveStatus("error");
      }
    }, 500);
    return () => clearTimeout(saveTimer.current);
  }, [programs, programData, activeId, templates, templateCategories, loaded]);

  const monday = mondayOf(weekOffset);
  const weekDates = Array.from({ length: 7 }, (_, i) => addDays(monday, i));
  const sunday = weekDates[weekDates.length - 1];
  const weekLabel =
    monday.getMonth() === sunday.getMonth()
      ? `${MONTHS_FR[monday.getMonth()]} ${monday.getFullYear()}`
      : `${MONTHS_FR[monday.getMonth()]} – ${MONTHS_FR[sunday.getMonth()]} ${sunday.getFullYear()}`;

  const todayKey = keyOf(mondayOf(0)) === keyOf(monday) ? keyOf(new Date()) : null;

  // ---- Vue mois ----
  const monthRef = new Date();
  monthRef.setHours(0, 0, 0, 0);
  monthRef.setDate(1);
  monthRef.setMonth(monthRef.getMonth() + monthOffset);
  const monthLabel = `${MONTHS_FR[monthRef.getMonth()]} ${monthRef.getFullYear()}`;
  const monthGridStart = addDays(monthRef, -((monthRef.getDay() + 6) % 7));
  const monthCells = Array.from({ length: 42 }, (_, i) => addDays(monthGridStart, i));
  const baseMonday = mondayOf(0);
  const goToWeekOfDate = (date) => {
    const off = Math.round((mondayOfDate(date) - baseMonday) / (7 * 24 * 3600 * 1000));
    setWeekOffset(off);
    setViewMode("week");
  };

  // ---- Mutations ----
  const getList = (k) => blocks[k] || [];

  const openNew = (dateKey, courseId = null, courseName = "") =>
    setEditor({

      draft: { title: "", duration: "", color: 0, content: "", courseId, courseName },

  const openEdit = (dateKey, block) => {

      setList(dateKey, [...getList(dateKey), { ...clean, id: newId() }]);

  // ---- Cours (encadré regroupant plusieurs blocs) ----

  const saveAsTemplate = (block) => {

  const confirmSaveTemplate = () => {

  };

  // ---- Gestion des programmations ----

    setActiveId(id);
    setWeekOffset(0);

  const deleteProgram = (id) => {

  // ---- Cycles (blocs de travail à plage de dates) ----

        endKey: endKey || keyOf(addDays(monday, 6)),
      },

  const openEditCycle = (cyc) =>

  // ---- Mode présentation (whiteboard box) ----
  const openPresentation = () => {
    const today = new Date();

    setPresentDate(inWeek ? today : new Date(monday));
  };

  // ---- Sauvegarde / restauration des données (JSON) ----
  const exportData = () => {
    try {
      const data = JSON.stringify(
        { programs, programData, activeId, templates, templateCategories },
        null,
        2
      );
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `builder-sauvegarde-${keyOf(new Date())}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    } catch (e) {
      setSaveStatus("error");
    }
  };
  const importData = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.programs && data.programData) {
          bumpUidPrograms(data.programData, data.templates);
          setPrograms(data.programs);
          setProgramData(migrateCycles(data.programData));
          setActiveId(data.activeId || (data.programs[0] && data.programs[0].id));
          setTemplates(data.templates || []);
          setTemplateCategories(data.templateCategories || []);
          setProgramsOpen(false);
        }
      } catch (e) {
        setSaveStatus("error");
      }
    };
    reader.readAsText(file);
  };

  // ---- Partage d'UN programme entre comptes (export / import additif) ----
  const exportProgram = (id) => {
    try {
      const prog = programs.find((p) => p.id === id);
      if (!prog) return;
      const payload = {
        _type: "ravnal-program",
        program: { name: prog.name },
        data: programData[id] || { blocks: {}, doneDays: {}, cycles: [] },
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {
        type: "application/json",
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const safe = (prog.name || "programme")
        .replace(/[^a-z0-9]+/gi, "-")
        .replace(/^-+|-+$/g, "")
        .toLowerCase();
      a.download = `programme-${safe || "export"}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    } catch (e) {
      setSaveStatus("error");
    }
  };

  const importProgram = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        // Cas 1 : un seul programme partage -> ajoute a cote des miens
        if (data && data._type === "ravnal-program" && data.data) {
          const id = newProgramId();
          const name =
            (data.program && data.program.name) || "Programme importé";
          const migrated = migrateCycles({ [id]: data.data })[id];
          setProgramData((pd) => {
            const next = { ...pd, [id]: migrated };
            bumpUidPrograms(next, templates);
            return next;
          });
          setPrograms((ps) => [...ps, { id, name }]);
          setActiveId(id);
          setProgramsOpen(false);
          return;
        }
        // Cas 2 : une sauvegarde complete -> tous ses programmes ajoutes sans ecraser
        if (data && data.programs && data.programData) {
          const idMap = {};
          const newProgs = data.programs.map((p) => {
            const nid = newProgramId();
            idMap[p.id] = nid;
            return { id: nid, name: p.name || "Programme importé" };
          });
          const added = {};
          Object.keys(data.programData).forEach((oldId) => {
            const nid = idMap[oldId] || newProgramId();
            added[nid] = data.programData[oldId];
          });
          const migratedMap = migrateCycles(added);
          setProgramData((pd) => {
            const next = { ...pd, ...migratedMap };
            bumpUidPrograms(next, templates);
            return next;
          });
          setPrograms((ps) => [...ps, ...newProgs]);
          if (newProgs[0]) setActiveId(newProgs[0].id);
          setProgramsOpen(false);
          return;
        }
        setSaveStatus("error");
      } catch (e) {
        setSaveStatus("error");
      }
    };
    reader.readAsText(file);
  };

  // ---- Raccourcis : duplication jour / semaine ----
  const cloneList = (list) => (list || []).map((b) => ({ ...b, id: newId() }));

  const copyDay = (dateKey) => {
    setDayMenuFor(null);
    setDayClipboard((getList(dateKey) || []).map((b) => ({ ...b })));
  };
  const pasteDay = (dateKey) => {
    setDayMenuFor(null);
    if (!dayClipboard) return;
    setList(dateKey, [...getList(dateKey), ...cloneList(dayClipboard)]);
  };
  const clearDay = (dateKey) => {
    setDayMenuFor(null);
    setList(dateKey, []);
    setDoneDays((d) => {
      const n = { ...d };
      delete n[dateKey];
      return n;
    });
  };
  const duplicateDayNextWeek = (date) => {
    setDayMenuFor(null);
    const src = getList(keyOf(date));
    if (!src.length) return;
    const tgt = keyOf(addDays(date, 7));
    setList(tgt, [...getList(tgt), ...cloneList(src)]);
  };

  const copyWeek = () => {
    setWeekMenuOpen(false);
    const map = {};
    weekDates.forEach((d, i) => {
      map[i] = (getList(keyOf(d)) || []).map((b) => ({ ...b }));
    });
    setWeekClipboard(map);

  const pasteWeek = () => {
    setWeekMenuOpen(false);
    if (!weekClipboard) return;
    setBlocks((prev) => {
      const next = { ...prev };
      weekDates.forEach((d, i) => {
        const src = weekClipboard[i] || [];
        if (!src.length) return;
        const k = keyOf(d);
        next[k] = [...(next[k] || []), ...src.map((b) => ({ ...b, id: newId() }))];
      });
      return next;
    });
  };
  const duplicateWeekNext = () => {
    setWeekMenuOpen(false);
    setBlocks((prev) => {
      const next = { ...prev };
      weekDates.forEach((d) => {
        const src = prev[keyOf(d)] || [];
        if (!src.length) return;
        const tgt = keyOf(addDays(d, 7));
        next[tgt] = [...(next[tgt] || []), ...src.map((b) => ({ ...b, id: newId() }))];
      });
      return next;
    });
    setWeekOffset((w) => w + 1);
  };

  // ---- Drag & drop ----
  const onDragStart = (fromKey, blockId) => {
    dragRef.current = { fromKey, blockId };

  const onDropOnDay = (toKey, toIndex = null) => {
    const drag = dragRef.current;
    setDragOverKey(null);
    if (!drag) return;
    const { fromKey, blockId } = drag;
    const fromList = getList(fromKey);
    const block = fromList.find((b) => b.id === blockId);
    if (!block) return;

    if (fromKey === toKey) {
      const without = fromList.filter((b) => b.id !== blockId);
      const insertAt = toIndex == null ? without.length : toIndex;
      without.splice(insertAt, 0, block);
      setList(toKey, without);
    } else {
      setList(fromKey, fromList.filter((b) => b.id !== blockId));
      const toList = [...getList(toKey)];
      const insertAt = toIndex == null ? toList.length : toIndex;
      toList.splice(insertAt, 0, block);
      setList(toKey, toList);
    }
    dragRef.current = null;
  };

  if (!loaded) {
    return (
      <div
        className="w-full min-h-screen flex items-center justify-center"
        style={{ background: "#FAFAFA", fontFamily: "'Inter', system-ui, sans-serif" }}

                          <MenuItem
                            icon={<ChevronRight size={15} />}
                            label="Dupliquer → semaine suiv."
                            onClick={() => duplicateDayNextWeek(date)}
                          />
                          <MenuItem
                            icon={<Copy size={15} />}
                            label="Copier le jour"
                            onClick={() => copyDay(k)}
                          />
                          <MenuItem
                            icon={<Plus size={15} />}

                            onClick={() => pasteDay(k)}
                            disabled={!dayClipboard}
                          />
                          <div className="my-1 border-t border-slate-100" />
                          <MenuItem
                            icon={<Trash2 size={15} />}
                            label="Vider le jour"
                            danger
                            onClick={() => clearDay(k)}
                          />

                      )}
                    </div>
                    <button
                      onClick={() => toggleDone(k)}
                      className={`w-5 h-5 rounded border flex items-center justify-center ${
                        doneDays[k]

                          : "border-slate-300 hover:border-slate-400"

                      aria-label="Marquer le jour comme prêt"

                      {doneDays[k] && <Check size={13} />}

                </div>

                {/* Blocs */}
                <div className="flex-1 p-2 space-y-2">
                  {(() => {
                    const renderCard = (block, bi) => (
                      <BlockCard
                        key={block.id}
                        block={block}
                        menuOpen={menuFor === block.id}
                        onMenuToggle={(e) => {
                          e.stopPropagation();
                          setMenuFor(menuFor === block.id ? null : block.id);
                        }}
                        onEdit={() => openEdit(k, block)}
                        onDuplicate={() => duplicateBlock(k, block)}
                        onTemplate={() => saveAsTemplate(block)}
                        onDelete={() => deleteBlock(k, block.id)}
                        onDragStart={() => onDragStart(k, block.id)}
                        onDropBefore={(e) => {
                          e.stopPropagation();
                          onDropOnDay(k, bi);
                        }}
                      />
                    );
                    const seen = new Set();
                    const out = [];
                    list.forEach((block, bi) => {
                      if (block.courseId) {
                        if (seen.has(block.courseId)) return;
                        seen.add(block.courseId);
                        const cid = block.courseId;
                        const inner = [];
                        list.forEach((b2, j) => {
                          if (b2.courseId === cid) inner.push(renderCard(b2, j));

                        out.push(
                          <CourseFrame
                            key={"course-" + cid}
                            name={block.courseName || "Cours"}
                            onRename={(val) => renameCourse(k, cid, val)}
                            onDelete={() => deleteCourse(k, cid)}
                            onAddBlock={() => openNew(k, cid, block.courseName || "Cours")}
                          >
                            {inner}
                          </CourseFrame>

                  <button
                    onClick={() => openNew(k)}

        <p className="text-xs text-slate-400 mt-4 text-center">

          Tout est enregistré automatiquement.

                >
                  <Download size={15} /> Sauvegarde
                </button>
                <button
                  onClick={() => fileInputRef.current && fileInputRef.current.click()}
                  className="flex-1 flex items-center justify-center gap-1.5 py-2 text-sm font-medium rounded-lg border border-slate-200 bg-white hover:bg-slate-100 text-slate-700"
                >
                  <Upload size={15} /> Restaurer
                </button>
              </div>
              <button
                onClick={() => programInputRef.current && programInputRef.current.click()}
                className="w-full flex items-center justify-center gap-1.5 py-2 mt-2 text-sm font-medium rounded-lg border border-slate-200 bg-white hover:bg-slate-100 text-slate-700"
              >
                <FilePlus size={15} /> Importer un programme reçu
              </button>
              <p className="text-xs text-slate-400 mt-2 text-center">
                « Restaurer » remplace toute ta librairie · « Importer un programme » ajoute un prog reçu sans rien effacer.
              </p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ---- Carte d'un bloc ----
function BlockCard({
  block, menuOpen, onMenuToggle, onEdit, onDuplicate, onTemplate, onDelete,
  onDragStart, onDropBefore,
}) {
  const c = COLORS[block.color] || COLORS[0];
  return (
    <div
      draggable
      onDragStart={onDragStart}
      onDrop={onDropBefore}
      onDragOver={(e) => e.preventDefault()}
      className="group relative rounded-lg overflow-visible cursor-grab active:cursor-grabbing"
      style={{ background: c.bg }}
    >
      <div className="absolute left-0 top-0 bottom-0 w-1 rounded-l-lg" style={{ background: c.bar }} />
      <div className="pl-3 pr-2 py-2">
        <div className="flex items-start justify-between gap-1">
          <div className="flex items-start gap-1 min-w-0">
            <GripVertical size={13} className="text-slate-400 opacity-0 group-hover:opacity-100 shrink-0 mt-0.5" />
            <span className="font-semibold text-sm text-slate-800 break-words">
              {block.title}
            </span>
            {block.duration && (
              <span className="text-xs text-slate-500 shrink-0">{block.duration}</span>
            )}
          </div>
          <button
            onClick={onMenuToggle}
            className="p-0.5 rounded hover:bg-black/5 text-slate-500 shrink-0"
            aria-label="Options du bloc"
          >
            <MoreHorizontal size={16} />
          </button>
        </div>
        {block.content && (
          <p className="text-xs text-slate-600 mt-1 whitespace-pre-line leading-snug break-words">
            {block.content}
          </p>
        )}
      </div>

      {menuOpen && (
        <div
          className="absolute right-1 top-7 z-30 w-52 bg-white rounded-lg shadow-lg border border-slate-200 py-1 text-sm"
          onClick={(e) => e.stopPropagation()}
        >
          <MenuItem icon={<Pencil size={15} />} label="Éditer" onClick={onEdit} />
          <MenuItem icon={<Copy size={15} />} label="Dupliquer" onClick={onDuplicate} />
          <MenuItem icon={<Bookmark size={15} />} label="Enregistrer en modèle" onClick={onTemplate} />
          <div className="my-1 border-t border-slate-100" />
          <MenuItem icon={<Trash2 size={15} />} label="Supprimer" danger onClick={onDelete} />
        </div>
      )}
    </div>
  );
}

        </span>

          value={name}

function MenuItem({ icon, label, onClick, danger, disabled }) {

// ---- Éditeur (modal) ----
function BlockEditor({ editor, templates, categories = [], onChange, onSave, onClose }) {
  const { draft, mode } = editor;
  const set = (patch) => onChange({ ...draft, ...patch });
  const [tplCat, setTplCat] = useState("");
  const appendCat = (txt) => {
    const cur = draft.content || "";
    set({ content: cur ? `${cur}\n${txt}` : txt });
  };

  return (
    <div
      className="fixed inset-0 z-40 flex items-center justify-center p-4"
      style={{ background: "rgba(15,23,42,0.45)" }}
      onClick={onClose}
    >
      <div
        className="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden"
        onClick={(e) => e.stopPropagation()}
      >
        <div className="flex items-center justify-between px-5 py-3 border-b border-slate-100">
          <h2 className="font-semibold text-slate-800">
            {mode === "new" ? "Nouveau bloc" : "Éditer le bloc"}
          </h2>
          <button onClick={onClose} className="p-1 rounded hover:bg-slate-100 text-slate-500">
            <X size={18} />
          </button>
        </div>

        <div className="px-5 py-4 space-y-4">
          {/* Presets rapides */}
          <div className="flex flex-wrap gap-1.5">
            {PRESETS.map((p) => (
              <button
                key={p.label}
                onClick={() => set({ title: p.label, color: p.color })}
                className="px-2.5 py-1 text-xs font-medium rounded-full border hover:bg-slate-50"
                style={{
                  borderColor: COLORS[p.color].bar,
                  color: "#334155",
                  background: COLORS[p.color].bg,
                }}
              >
                {p.label}
              </button>
            ))}
          </div>

          {/* Depuis un modèle : catégorie puis modèle */}
          {templates.length > 0 &&
            (() => {
              const catsWithItems = categories.filter((c) =>
                templates.some((t) => t.categoryId === c.id)
              );
              const uncat = templates.filter(
                (t) => !t.categoryId || !categories.some((c) => c.id === t.categoryId)
              );
              const list =
                tplCat === "__none__"
                  ? uncat
                  : tplCat
                  ? templates.filter((t) => t.categoryId === tplCat)
                  : [];
              return (
                <div>
                  <label className="block text-xs font-medium text-slate-500 mb-1">
                    Partir d'un modèle
                  </label>
                  <div className="flex gap-2">
                    <select
                      value={tplCat}
                      onChange={(e) => setTplCat(e.target.value)}
                      className="flex-1 text-sm border border-slate-200 rounded-lg px-2 py-1.5 bg-white"
                    >
                      <option value="">— Catégorie —</option>
                      {catsWithItems.map((c) => (
                        <option key={c.id} value={c.id}>
                          {c.name}
                        </option>
                      ))}
                      {uncat.length > 0 && <option value="__none__">Sans nom</option>}
                    </select>
                    <select
                      value=""
                      disabled={!list.length}
                      onChange={(e) => {
                        const t = templates.find((x) => x.id === e.target.value);
                        if (t)
                          set({
                            title: t.title,
                            color: t.color,
                            duration: t.duration,
                            content: t.content,
                          });
                      }}
                      className="flex-1 text-sm border border-slate-200 rounded-lg px-2 py-1.5 bg-white disabled:opacity-50"
                    >
                      <option value="">{list.length ? "— Modèle —" : "—"}</option>
                      {list.map((t) => (
                        <option key={t.id} value={t.id}>
                          {t.title}
                        </option>
                      ))}
                    </select>
                  </div>
                </div>
              );
            })()}

          {/* Benchmarks Girls / Heroes */}
          <div>
            <label className="block text-xs font-medium text-slate-500 mb-1">
              Insérer un benchmark
            </label>
            <select
              className="w-full text-sm border border-slate-200 rounded-lg px-2 py-1.5 bg-white"
              value=""
              onChange={(e) => {
                const bm = BENCHMARKS.find((b) => b.id === e.target.value);
                if (bm) set({ title: bm.name, content: bm.content });
              }}
            >
              <option value="">— Choisir un benchmark —</option>
              <optgroup label="Girls">
                {BENCHMARKS.filter((b) => b.group === "Girls").map((b) => (
                  <option key={b.id} value={b.id}>{b.name}</option>
                ))}
              </optgroup>
              <optgroup label="Heroes">
                {BENCHMARKS.filter((b) => b.group === "Heroes").map((b) => (
                  <option key={b.id} value={b.id}>{b.name}</option>
                ))}
              </optgroup>
            </select>
          </div>

          {/* Catalogues — un menu déroulant par famille (cumulable) */}
          <div className="space-y-2">
            <label className="block text-xs font-medium text-slate-500">
              Catalogue (s'ajoute au contenu, cumulable)
            </label>
            <div className="grid grid-cols-2 gap-2">
              {CATALOG_DISCIPLINES.map((g) => (
                <select
                  key={g.cat}
                  value=""
                  onChange={(e) => {
                    if (e.target.value !== "") appendCat(g.items[Number(e.target.value)]);
                  }}
                  className="w-full text-sm border border-slate-200 rounded-lg px-2 py-1.5 bg-white"
                >
                  <option value="">{g.cat}</option>
                  {g.items.map((it, idx) => (
                    <option key={idx} value={idx}>{it}</option>
                  ))}
                </select>
              ))}
              <select
                value=""
                onChange={(e) => {
                  if (e.target.value === "") return;
                  const [zi, ii] = e.target.value.split(":").map(Number);
                  const it = CATALOG_MOBILITY[zi]?.items[ii];
                  if (it) appendCat(it);
                }}
                className="w-full text-sm border border-slate-200 rounded-lg px-2 py-1.5 bg-white"
              >
                <option value="">Mobilité</option>
                {CATALOG_MOBILITY.map((z, zi) => (
                  <optgroup key={zi} label={z.zone}>
                    {z.items.map((it, ii) => (
                      <option key={ii} value={`${zi}:${ii}`}>{it}</option>
                    ))}
                  </optgroup>
                ))}
              </select>
            </div>
            <select
              value=""
              onChange={(e) => {
                if (e.target.value === "") return;
                const [fi, ii] = e.target.value.split(":").map(Number);
                const it = CATALOG_METHODS[fi]?.items[ii];
                if (it) appendCat(it.content ? `${it.name}\n${it.content}` : it.name);
              }}
              className="w-full text-sm border border-slate-200 rounded-lg px-2 py-1.5 bg-white"
            >
              <option value="">Méthodes</option>
              {CATALOG_METHODS.map((f, fi) => (
                <optgroup key={fi} label={f.fam}>
                  {f.items.map((it, ii) => (
                    <option key={ii} value={`${fi}:${ii}`}>{it.name}</option>
                  ))}
                </optgroup>
              ))}
            </select>
            <select
              value=""
              onChange={(e) => {
                if (e.target.value === "") return;
                const [fi, ii] = e.target.value.split(":").map(Number);
                const it = CATALOG_QUALITIES[fi]?.items[ii];
                if (it) appendCat(it.content ? `${it.name}\n${it.content}` : it.name);
              }}
              className="w-full text-sm border border-slate-200 rounded-lg px-2 py-1.5 bg-white"
            >
              <option value="">Qualités</option>
              {CATALOG_QUALITIES.map((f, fi) => (
                <optgroup key={fi} label={f.fam}>
                  {f.items.map((it, ii) => (
                    <option key={ii} value={`${fi}:${ii}`}>{it.name}</option>
                  ))}
                </optgroup>
              ))}
            </select>
          </div>

          {/* Titre + durée */}
          <div className="flex gap-2">
            <div className="flex-1">
              <label className="block text-xs font-medium text-slate-500 mb-1">Titre</label>
              <input
                autoFocus
                value={draft.title}
                onChange={(e) => set({ title: e.target.value })}
                placeholder="Warmup, Force, Metcon…"
                className="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-200"
              />
            </div>
            <div className="w-24">
              <label className="block text-xs font-medium text-slate-500 mb-1">Durée</label>
              <input
                value={draft.duration}
                onChange={(e) => set({ duration: e.target.value })}
                placeholder="12'"
                className="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-200"
              />
            </div>
          </div>

          {/* Couleur */}
          <div>
            <label className="block text-xs font-medium text-slate-500 mb-1.5">Couleur</label>
            <div className="flex gap-2">
              {COLORS.map((c, i) => (
                <button
                  key={c.name}
                  onClick={() => set({ color: i })}
                  title={c.name}
                  className={`w-7 h-7 rounded-full border-2 ${
                    draft.color === i ? "border-slate-800" : "border-transparent"
                  }`}
                  style={{ background: c.bg }}
                >
                  <span className="block w-full h-full rounded-full" style={{ boxShadow: `inset 0 0 0 2px ${c.bar}` }} />
                </button>
              ))}
            </div>
          </div>

          {/* Contenu */}
          <div>
            <label className="block text-xs font-medium text-slate-500 mb-1">Contenu</label>
            <textarea
              value={draft.content}
              onChange={(e) => set({ content: e.target.value })}
              rows={6}
              placeholder={"3 rounds:\n10 push-ups\n15 air squats\n200m run"}
              className="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 font-mono leading-relaxed focus:outline-none focus:ring-2 focus:ring-blue-200"
            />
          </div>
        </div>

        <div className="flex items-center justify-end gap-2 px-5 py-3 border-t border-slate-100 bg-slate-50">
          <button
            onClick={onClose}
            className="px-4 py-2 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-100"
          >
            Annuler
          </button>
          <button
            onClick={onSave}
            className="px-4 py-2 text-sm font-medium rounded-lg text-white"
            style={{ background: "#111" }}
          >
            {mode === "new" ? "Ajouter le bloc" : "Enregistrer"}
          </button>
        </div>
      </div>
    </div>
  );
}


function Gate() {
  const [session, setSession] = useState(undefined); // undefined = chargement
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    supa.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = supa.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  const signIn = async () => {
    if (!email || !pw) return;
    setBusy(true); setErr("");
    const { error } = await supa.auth.signInWithPassword({
      email: email.trim(), password: pw,
    });
    if (error) setErr("Identifiants incorrects ou compte introuvable.");
    setBusy(false);
  };

  if (session === undefined)
    return (
      <div className="w-full min-h-screen flex items-center justify-center text-slate-400">
        Chargement…
      </div>
    );

  if (session) return <App />;

  return (
    <div className="w-full min-h-screen flex items-center justify-center bg-slate-50 px-4">
      <div className="w-full max-w-sm bg-white rounded-2xl border border-slate-200 p-8 shadow-sm">
        <div className="flex items-center justify-center w-12 h-12 rounded-xl text-white font-bold mb-4" style={{ background: "#111" }}>R</div>
        <h1 className="text-xl font-semibold text-slate-800 mb-1">RAVNAL PROGRAMMATION</h1>
        <p className="text-sm text-slate-400 mb-6">Connecte-toi pour accéder à ta programmation.</p>
        <input
          type="email" inputMode="email" autoCapitalize="none" autoCorrect="off"
          placeholder="Email" value={email}
          onChange={(e) => setEmail(e.target.value)}
          className="w-full mb-3 px-3 py-2.5 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-300"
        />
        <input
          type="password" placeholder="Mot de passe" value={pw}
          onChange={(e) => setPw(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") signIn(); }}
          className="w-full mb-3 px-3 py-2.5 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-300"
        />
        {err && <p className="text-sm text-red-500 mb-3">{err}</p>}
        <button
          onClick={signIn} disabled={busy}
          className="w-full px-4 py-2.5 text-sm font-medium rounded-lg text-white disabled:opacity-60"
          style={{ background: "#111" }}
        >
          {busy ? "Connexion…" : "Se connecter"}
        </button>
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<Gate />);

</script>
